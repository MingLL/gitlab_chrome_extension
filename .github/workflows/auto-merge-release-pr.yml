name: Auto Merge Release PR

"on":
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-release-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    if: |
      github.event.pull_request.draft == false &&
      startsWith(github.event.pull_request.head.ref, 'release-please--branches--') &&
      contains(join(github.event.pull_request.labels.*.name, ','), 'autorelease: pending')
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge for release-please PR
        uses: actions/github-script@v7
        with:
          script: |
            const pullRequest = context.payload.pull_request;

            if (pullRequest.auto_merge) {
              core.info(`Auto-merge is already enabled for PR #${pullRequest.number}.`);
              return;
            }

            await github.graphql(
              `
                mutation EnableAutoMerge($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(
                    input: {
                      pullRequestId: $pullRequestId
                      mergeMethod: SQUASH
                    }
                  ) {
                    clientMutationId
                  }
                }
              `,
              {
                pullRequestId: pullRequest.node_id
              }
            );

            core.info(`Enabled auto-merge for PR #${pullRequest.number}.`);
